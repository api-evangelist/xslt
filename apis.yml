aid: xslt
name: XSLT
description: XSLT (Extensible Stylesheet Language Transformations) is a language for
  transforming XML documents into other formats such as HTML, plain text, or different
  XML structures. It uses template-based rules and XPath expressions to select and
  restructure XML data, commonly used in data integration and document publishing
  pipelines.
type: Index
